# Tiny Tapeout project information
project:
  title:        "MNIST Binary Neural Net (Inference)"      # Project title
  author:       "Marc-Andre Wessner"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A fully pipelined hardware BNN inference engine that classifies MNIST digits by sequencing a quantized autoencoder (3 binary conv layers + 2 max-pool layers) through shared SRAM, followed by a combinational XGBoost decision tree, all generated from trained model weights via Jinja2 codegen and verified end-to-end in cocotb simulation against the Python reference."      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "3x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_maw_mnistbnn"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "sram.sv"
    - "mnist_loader.sv"
    - "load_conv_op_3x6.sv"
    - "conv_weights_3x3_l1.sv"
    - "conv_weights_3x3_l2.sv"
    - "conv_weights_2x2_l3.sv"
    - "conv_layer1.sv"
    - "conv_layer2.sv"
    - "conv_layer3.sv"
    - "classification_tree.sv"
    - "maxpool_2x2.sv"
    - "main.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs — 8-bit MNIST pixel data (two OR-pooled 2×2 blocks per byte, row-major)
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "number_o[0]"
  uo[1]: "number_o[1]"
  uo[2]: "number_o[2]"
  uo[3]: "number_o[3]"
  uo[4]: "inference_done_o"
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "data_in_clk"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
